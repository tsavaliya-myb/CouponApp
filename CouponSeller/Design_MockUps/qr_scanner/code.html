<body class="bg-black text-on-primary font-body antialiased overflow-hidden h-screen w-screen">
<!-- Camera Background Emulation -->
<div class="fixed inset-0 z-0 overflow-hidden">
<img class="w-full h-full object-cover scale-110 blur-[2px]" data-alt="Blurred retail environment with warm lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5LgpH6S-jTc3xkXPdGDV7Mkco-z0mS7mn9QkI6sD_xkrf2kpvu5h-Lpdgysvy-9ogKzg_wgxZei1sovekYMSq5OQtWuwe6HMqUpeT6XKqqRQyYG14h371FJq9MlWAvhzy53UTco9gJ9pG108yPknsi-4LN6lkUfEsU0rGQ6A0D0DJiOSHYKmwgg8NM-_mGRUtPJw3U0CFx01vDeFDSN0M9mSR2uhfFgOXZa8URpxw-sKxMUrpAmQtm7GcmK3FrS5-_wlgL95xeZA"/>
</div>
<!-- UI Layer -->
<div class="relative z-10 flex flex-col h-full">
<!-- Header: TopAppBar (Modified for Overlay) -->
<header class="flex justify-between items-center w-full px-6 py-8 max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/40 backdrop-blur-md text-white border border-white/10 hover:bg-black/60 transition-all">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<div class="flex-1 text-center">
<h1 class="font-headline font-extrabold text-white text-lg tracking-tight uppercase">Executive Ledger</h1>
</div>
<div class="w-12 h-12 flex items-center justify-center">
<!-- Spacer for centering -->
</div>
</header>
<!-- Main Content: Scanner View -->
<main class="flex-1 flex flex-col items-center justify-center px-6 text-center">
<div class="w-full max-w-sm mb-12">
<h2 class="font-headline font-bold text-2xl text-white mb-2">Scan User Profile QR</h2>
<p class="text-white/70 text-sm leading-relaxed px-4">
                    Align the user's QR code within the frame to validate their subscription and coupons.
                </p>
</div>
<!-- Scanner Frame -->
<div class="relative w-72 h-72 md:w-80 md:h-80 flex items-center justify-center">
<!-- The "Hole" is created by the scan-frame shadow logic -->
<div class="scan-frame w-full h-full rounded-3xl relative overflow-hidden">
<!-- Corner Indicators -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-primary-fixed-dim rounded-tl-3xl"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-primary-fixed-dim rounded-tr-3xl"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-primary-fixed-dim rounded-bl-3xl"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-primary-fixed-dim rounded-br-3xl"></div>
<!-- Scanning Animation Line (Static Representation) -->
<div class="absolute top-1/2 left-0 w-full h-0.5 bg-gradient-to-r from-transparent via-primary-fixed-dim to-transparent opacity-60"></div>
</div>
</div>
<!-- Floating Action Buttons / Secondary Options -->
<div class="mt-16 flex flex-col gap-4 w-full max-w-xs">
<button class="bg-gradient-to-br from-primary to-primary-container text-white py-4 px-8 rounded-xl font-bold tracking-wide shadow-lg hover:opacity-90 transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="keyboard">keyboard</span>
                    Manual Input
                </button>
<p class="text-white/40 text-[10px] uppercase tracking-[0.2em] font-medium">
                    Ledger Secure Protocol v4.2
                </p>
</div>
</main>
<!-- Contextual Notification (Simulated State) -->
<div class="p-6 mb-8 flex justify-center">
<div class="bg-surface-container-lowest/10 backdrop-blur-xl px-6 py-3 rounded-full flex items-center gap-3 border border-white/5">
<div class="w-2 h-2 rounded-full bg-secondary-fixed shadow-[0_0_8px_rgba(163,246,156,0.6)]"></div>
<span class="text-white/80 text-xs font-medium tracking-wide">Camera System Active</span>
</div>
</div>
</div>
<!-- Hidden bottom nav suppression as per rule: suppressed on transactional/task-focused pages -->
<!-- But if required by "Must execute BottomNavBar from JSON if it's top level" logic, we omit it here because this is a specific Scanner screen (Transactional). -->
