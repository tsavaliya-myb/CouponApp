name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - 'CouponAPI/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/couponapi
            git pull origin main --no-tags
            cd CouponAPI
            npm ci
            npm run build
            npm prune --omit=dev
            npx prisma migrate deploy
            pm2 restart couponapi --update-env
