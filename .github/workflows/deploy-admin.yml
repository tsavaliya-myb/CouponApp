name: Deploy Admin

on:
  push:
    branches:
      - main
    paths:
      - 'CouponAdmin/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: CouponAdmin/package-lock.json

      - name: Install dependencies
        working-directory: CouponAdmin
        run: npm ci

      - name: Build
        working-directory: CouponAdmin
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.ADMIN_API_BASE_URL }}

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "CouponAdmin/dist/"
          target: "/var/www/couponadmin/"
          strip_components: 2
